name: Release

on:
  release:
    types:
      - created
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        
      - name: Set up Docker
        uses: docker/setup-buildx-action@v4
        
      - name: Build test image
        run: |
          docker build -t docker-remote-deployment-action:test .
          docker run --rm docker-remote-deployment-action:test echo "Test container runs successfully"
  
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            sulthonzh/docker-remote-deployment-action:latest
            sulthonzh/docker-remote-deployment-action:${{ github.event.release.tag_name }}
            sulthonzh/docker-remote-deployment-action:${{ github.sha }}



